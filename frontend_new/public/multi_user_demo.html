<!DOCTYPE html>
<html>
<head>
    <title>Multi-User Notification Simulation</title>
    <style>
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; background: #0f172a; color: white; margin: 0; padding: 40px; }
        .container { display: flex; gap: 20px; width: 100%; max-width: 1000px; justify-content: space-between; }
        .user-panel { background: #1e293b; border: 1px solid #334155; padding: 20px; width: 30%; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .user-panel h2 { margin-top: 0; font-size: 1.2rem; color: #38bdf8; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .log { background: #0b1120; height: 300px; overflow-y: auto; padding: 15px; font-family: 'Courier New', Courier, monospace; font-size: 13px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #1e293b; }
        .log div { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #1e293b; }
        .log .received { color: #a7f3d0; }
        .log .sys { color: #94a3b8; }
        button { background: #3b82f6; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; margin-bottom: 5px; }
        button:hover { background: #2563eb; }
        .global-actions { margin-bottom: 30px; background: #1e293b; padding: 20px; border-radius: 12px; width: 100%; max-width: 1000px; border: 1px solid #334155; }
    </style>
</head>
<body>
    <h1>Multi-User Notification Demo</h1>
    <p style="color: #94a3b8; margin-bottom: 30px;">This simulates multiple distinct users connected via WebSockets simultaneously.</p>

    <div class="global-actions">
        <h2 style="margin-top: 0; font-size: 1.2rem;">Admin Controls (Simulated Backend Triggers)</h2>
        <div style="display: flex; gap: 10px;">
            <button onclick="triggerNotification('Alice')">Notify Alice Only</button>
            <button onclick="triggerNotification('Bob')">Notify Bob Only</button>
            <button onclick="triggerNotification('all')" style="background: #10b981;">Broadcast to All (System Event)</button>
        </div>
    </div>

    <div class="container">
        <!-- Client 1 -->
        <div class="user-panel">
            <h2>User 1: Alice</h2>
            <div class="log" id="logAlice"></div>
        </div>

        <!-- Client 2 -->
        <div class="user-panel">
            <h2>User 2: Bob</h2>
            <div class="log" id="logBob"></div>
        </div>

        <!-- Client 3 -->
        <div class="user-panel">
            <h2>Admin Dashboard (All)</h2>
            <div class="log" id="logAdmin"></div>
            <p style="font-size: 0.8rem; color: #94a3b8;">Admin is subscribed to the global channel and their own specific alerts.</p>
        </div>
    </div>

    <script>
        function setupWebSocket(userId, logElementId) {
            const ws = new WebSocket(`ws://localhost:8000/ws/notifications/${userId}`);
            const logEl = document.getElementById(logElementId);
            
            const log = (msg, type='sys') => {
                logEl.innerHTML += `<div class="${type}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
                logEl.scrollTop = logEl.scrollHeight;
            };

            ws.onopen = () => log(`Connected to WebSocket as ${userId}`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                log(`🔔 ${data.message}`, 'received');
            };
            ws.onclose = () => log(`Connection closed`, 'sys');
            ws.onerror = () => log(`Connection error`, 'sys');
        }

        // Initialize three distinct WebSocket connections concurrently
        setupWebSocket('Alice', 'logAlice');
        setupWebSocket('Bob', 'logBob');
        setupWebSocket('admin', 'logAdmin'); // Admin connects as 'admin'
        
        async function triggerNotification(targetId) {
            let msg = '';
            if (targetId === 'all') {
                msg = 'SYSTEM STAGE ADVANCED: Team Formation Started!';
            } else {
                msg = `Private message directed specifically to ${targetId}`;
            }

            const payload = {
                user_id: targetId,
                message: msg,
                type: 'system'
            };
            
            try {
                await fetch('http://localhost:8000/notifications/trigger', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (err) {
                console.error("Failed to trigger", err);
                alert("Failed to connect to backend on port 8000");
            }
        }
    </script>
</body>
</html>
