name: Phase 0 CI

"on":
  push:
    branches:
      - main
      - phase0/stabilize-current-system
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:git log -1 --oneline
git status --short
  group: phase0-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eventos_ci
          POSTGRES_PASSWORD: eventos_ci
          POSTGRES_DB: eventos_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eventos_ci -d eventos_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql://eventos_ci:eventos_ci@localhost:5432/eventos_ci
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      EMAIL_DELIVERY_MODE: mock
      EMAIL_SENDGRID_FALLBACK_TO_MOCK: "false"
      SENDGRID_API_KEY: ""
      SENDGRID_FROM_EMAIL: ci@example.invalid
      SENDGRID_FROM_NAME: EventOS CI
      GOOGLE_API_KEY: ""
      GEMINI_API_KEY: ""
      SECRET_KEY: phase0-ci-test-secret
      JWT_SECRET_KEY: phase0-ci-test-secret
      FRONTEND_BASE_URL: http://localhost:5173

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest pytest-env

      - name: Compile backend
        run: python -m compileall -q backend/app

      - name: Apply migrations
        working-directory: backend
        run: python -m alembic upgrade head

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest -q

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend_new

    env:
      CI: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend_new/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:run

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: postgresql://eventos_ci:eventos_ci@postgres:5432/eventos_ci
      REDIS_URL: redis://redis:6379/0
      EMAIL_DELIVERY_MODE: mock
      EMAIL_SENDGRID_FALLBACK_TO_MOCK: "false"
      SENDGRID_API_KEY: ""
      GOOGLE_API_KEY: ""
      GEMINI_API_KEY: ""
      SECRET_KEY: phase0-ci-test-secret
      JWT_SECRET_KEY: phase0-ci-test-secret
      FRONTEND_BASE_URL: http://localhost:5173

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare Docker CI environment
        run: cp .env.example backend/.env

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Build backend image
        run: docker build -t eventos-backend-ci ./backend

  security-checks:
    name: Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Reject committed environment files
        shell: bash
        run: |
          set -euo pipefail

          violations="$(
            git ls-files |
            grep -E '(^|/)\.env($|\.)' |
            grep -Ev '\.(example|sample|template)$' || true
          )"

          if [ -n "$violations" ]; then
            echo "Committed environment files detected:"
            echo "$violations"
            exit 1
          fi

      - name: Reject private keys and provider secrets
        shell: bash
        run: |
          set -euo pipefail

          patterns='BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY|SG\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}|AIza[0-9A-Za-z_-]{35}|github_pat_[A-Za-z0-9_]{50,}|gh[pousr]_[A-Za-z0-9_]{36,}|(AKIA|ASIA)[0-9A-Z]{16}|sk-(proj-)?[A-Za-z0-9_-]{32,}'

          if git grep -nEI "$patterns" -- .; then
            echo "Possible private key or provider secret detected."
            exit 1
          fi

          echo "No obvious provider secrets detected."

      - name: Reject database dumps and backup archives
        shell: bash
        run: |
          set -euo pipefail

          violations="$(
            git ls-files |
            grep -Ei '\.(dump|backup|bak|sqlite|sqlite3|db|sql|zip|rar|7z|tar|tgz|tar\.gz)$' ||
            true
          )"

          if [ -n "$violations" ]; then
            echo "Database dump or backup archive detected:"
            echo "$violations"
            exit 1
          fi
